name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104a3 # v3.6.1

    # Railway can build your Dockerfile natively, but this action acts as a CI
    # pipeline to guarantee your Docker image successfully builds before deployment.
    - name: Build the Docker image
      uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520987 # v6.13.0
      with:
        context: .
        file: Dockerfile
        push: false
        tags: |
          axiom-trade-bot:${{ github.sha }}
          axiom-trade-bot:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Optional: If you want to push this to GitHub Container Registry (GHCR)
    # so Railway pulls the pre-built image instead of building it from scratch,
    # you would add a `docker login` and `docker push` step here.
